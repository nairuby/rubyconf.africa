practicalities:
  title: "Practicalities for Ruby Conf Africa 2026"
  description: "Find all the practical information you need for attending Ruby Conf Africa 2026, including venue details, travel information, and accommodations."
  hero_subtitle: "Your comprehensive guide to attending RubyConf Africa"
  download_guide: "Download Travel Guide"
  intro_update: "Explore our A-Z comprehensive guide for <strong>RubyConf Africa 2026</strong>. We keep this information current, so anticipate updates as the event draws nearer. Last updated on <strong>December 23rd, 2025</strong>."
  travel_auth_title: "Travel Authorisations"
  travel_auth_subtitle: "Travelling to Kenya for Ruby Conf Africa 2026"
  visa_text: "There are no visa requirements for any traveller visiting Kenya however you must complete your <strong>Electronic Travel Authorisation</strong> (eTA) at least <strong>2 weeks</strong> prior to travel to Kenya to avoid inconveniences."
  faq_fee_q: "What is the eTA fee for travellers?"
  faq_fee_a: "The eTA fee is <strong>USD 32.50</strong> per traveller, plus bank and processing fees."
  faq_who_q: "Who should apply for the eTA?"
  faq_who_a_1: "All foreign visitors must apply for an eTA unless they are holders of valid Kenya Permanent Residence, Work Permits and Passes."
  faq_who_a_2: "Passport holders from the following <strong>EAC</strong> countries are exempted from applying to an eTA: <em>Burundi, Democratic Republic of Congo, Rwanda, South Sudan, Tanzania and Uganda</em>."
  faq_who_note: "<strong>Important Note:</strong> The eTA application collects biographic information and answers to eligibility questions from the traveller. Applications are usually processed within <strong>3 days</strong>, but in some cases it may take longer. <strong>We recommend applying for your eTA 2 weeks prior to travel</strong>. You can submit your application up to 3 months prior to travel."
  faq_who_rec: "We highly recommend that you apply as soon as you have booked your accommodation and transport tickets."
  faq_how_q: "How to Apply for your eTA?"
  faq_how_a: "Applications are made through the official Kenyan Electronic Travel Authority website:"
  faq_health_q: "What health documents do I need to show for my arrival in Kenya?"
  faq_health_a_1: "Currently, a Yellow Fever Certificate is required and in some cases, a COVID-19 certificate will be needed."
  faq_health_a_2: "Please refer to these"
  incoming_travellers: "Incoming Travellers"
  requirements_details: "requirements for further details."
  faq_docs_q: "What Documents are needed for your ETA Application?"
  faq_docs_intro: "Please have the following documents ready before starting your application:"
  doc_passport: "Valid passport for at least six (6) months after your planned date of arrival into Kenya, with at least one blank page."
  doc_photo: "Recent passport picture OR a selfie picture taken during the application process."
  doc_contact: "Contact details (home address, telephone, email)."
  doc_travel_info: "Travel information and flight itinerary (arrival flight number, date of departure of initial flight in case of connecting flights)."
  doc_booking: "Proof of booking for the hotel you will be staying at (if staying with friends, a letter of invitation is accepted)."
  doc_payment: "Credit/Debit card information for payment, if applicable."
  doc_invitation: "Conference invitation or participation letter."
  doc_invitation_note: "To obtain the conference invitation or participation letter fill out the"
  conference_letter_form: "conference letter request form"
  to_provide_letter: "to provide you with the letter."
  speakers_guide_title: "Guide For Travelling Speakers!"
  speakers_guide_text: "Please note that, unfortunately, we are unable to cover travel or accommodation expenses for speakers. Therefore, you will need to make your own arrangements for flights and hotels. We understand that this information is crucial for planning your trip, and we find it important to communicate this clearly."
  hotel_title: "Hotel Recommendations"
  hotel_text: "We have curated a selection of top-rated hotels, all within close proximity to our venue. Catering to various preferences and budgets, these options ensure convenience and comfort during your stay. For any inquiries, please write to us at"
  hotel_button: "View Detailed Hotel Recommendations"
  attractions_title: "Tourist Attractions in Kenya"
  attractions_subtitle: "A Guide for International Speakers & Guests"
  nairobi_park: "<strong>Nairobi National Park:</strong> Witness lions, zebras, giraffes, and rhinos just a short drive from Nairobi's city centre."
  giraffe_centre: "<strong>Giraffe Centre:</strong> Get up close and personal with endangered Rothschild's giraffes at this non-profit sanctuary."
  sheldrick_trust: "<strong>David Sheldrick Wildlife Trust:</strong> Visit the orphanage and learn about elephant rescue and rehabilitation efforts."
  museum: "<strong>Nairobi National Museum:</strong> Immerse yourself in Kenya's rich history and culture."
  karen_blixen: "<strong>Karen Blixen Museum:</strong> Explore the home of the \"Out of Africa\" author."
  bomas: "<strong>Bomas of Kenya:</strong> Experience traditional Kenyan culture through dance and demonstrations."
  uhuru_park: "<strong>Uhuru Park:</strong> Relax in Nairobi's largest park with lake and boat rides."
  maasai_mara: "<strong>Maasai Mara National Reserve:</strong> Witness the awe-inspiring wildebeest migration."
  amboseli: "<strong>Amboseli National Park:</strong> Marvel at elephants against Mount Kilimanjaro's backdrop."
  lake_nakuru: "<strong>Lake Nakuru National Park:</strong> See spectacular flamingo concentrations."
  karura: "<strong>Karura Forest:</strong> Hike or bike through this expansive indigenous forest."
  ngong_hills: "<strong>Ngong Hills:</strong> Hike or take a zipline adventure with Great Rift Valley views."
  shopping: "<strong>Shopping:</strong> Explore vibrant markets like Maasai Market or upscale malls."
  final_note_title: "Remember, this is just a starting point!"
  final_note_text: "Kenya has a wealth of other attractions to discover. Be sure to consult with your travel agent or do further research online to find experiences that suit your interests and time constraints. <strong>Enjoy your time in Kenya!</strong>"

code_of_conduct_page:
  title: "Code of Conduct Ruby Conf Africa 2026"
  description: "Read the code of conduct for Ruby Conf Africa 2026. We are committed to providing a safe and welcoming environment for all attendees."
  hero_title: "Code of Conduct"
  hero_subtitle: "Ruby Conf Africa 2026"
  hero_description: "We are committed to providing a safe and welcoming environment for all attendees. Read our code of conduct to understand our community standards."
  commitment_title: "Our Commitment"
  commitment_text: "The African Ruby Community is dedicated to providing a harassment-free and inclusive event experience for everyone regardless of gender identity and expression, sexual orientation, disabilities, neurodiversity, physical appearance, body size, ethnicity, nationality, race, age, religion, or other protected category."
  expected_behavior_title: "Expected Behavior"
  be_excellent_title: "Be Excellent to Each Other"
  be_excellent_text: "We want the event to be an excellent experience for everyone regardless of gender identity and expression, sexual orientation, disabilities, neurodiversity, physical appearance, body size, ethnicity, nationality, race, age, religion, or other protected category. Treat everyone with respect. Participate while acknowledging that everyone deserves to be here and each of us has the right to enjoy our experience without fear of harassment, discrimination, or condescension, whether blatant or via micro-aggressions."
  speak_up_title: "Speak Up If You See or Hear Something"
  speak_up_text: "Harassment is not tolerated, and you are empowered to politely engage when you or others are disrespected. The person making you feel uncomfortable may not be aware of what they are doing, and politely bringing their behavior to their attention is encouraged. If you are being harassed or feel uncomfortable, notice that someone else is being harassed, or have any other concerns, please contact a member of the event staff immediately."
  unacceptable_behavior_title: "Unacceptable Behavior"
  harassment_text: "Harassment is not tolerated and includes but is not limited to:"
  harassment_1: "Verbal language that reinforces social structures of domination"
  harassment_2: "Sexual imagery in public spaces"
  harassment_3: "Deliberate intimidation, stalking, or following"
  harassment_4: "Harassing photography or recording"
  harassment_5: "Sustained disruption of talks or other events"
  harassment_6: "Inappropriate physical contact and unwelcome sexual attention"
  harassment_compliance: "Participants asked to stop any harassing behavior are expected to comply immediately."
  scope_title: "Scope"
  scope_text_1: "This policy extends to talks, forums, workshops, code labs, social media, parties, hallway conversations, all attendees, partners, sponsors, volunteers, event staff, etc."
  scope_text_2: "The African Ruby Community reserves the right to refuse admittance to, or remove any person from, any African Ruby Community-hosted event (including future events) at any time in its sole discretion."
  zero_tolerance: "<strong>Our zero-tolerance policy</strong> means that we will look into and review every allegation of violation of our Event Community Guidelines and Anti-Harassment Policy and respond appropriately."
  partners_title: "Exhibiting Partners and Sponsors"
  partners_text: "Exhibiting partners, sponsors or vendor booths, or similar activities are also subject to this policy. In particular, exhibitors should not use sexualized images, activities, or other material. Booth staff (including volunteers) should not use sexualized clothing/uniforms/costumes, or otherwise create a sexualized environment."
  why_important_title: "Why This Policy is Important"
  why_important_text: "Harassment at events and in online communities is unfortunately common. Creating an official policy aims to improve this by making it clear that harassment of anyone for any reason is not acceptable within our events and communities. This policy may prevent harassment by clearly defining expectations for behavior, aims to provide reassurance, and encourages people who have had bad experiences at other events to participate in this one."
  license_title: "License and Attribution"
  license_text_1: "This policy is licensed under the"
  license_link_text: "Creative Commons Zero license"
  license_text_2: "This policy is based on and influenced by several other community policies including the Ohio LinuxFest Anti-Harassment policy, Con Anti-Harassment Project, Geek Feminism Wiki (created by the Ada Initiative), ConfCodeofConduct.com, JSconf, Rust, Diversity in Python, and Write/Speak/Code."

