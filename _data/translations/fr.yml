  faq_refund_q: "Puis-je obtenir un remboursement si je ne peux pas assister ?"
  faq_refund_a: "Oui, des remboursements complets sont disponibles jusqu'à 30 jours avant l'événement. Après cela, les billets ne sont pas remboursables mais peuvent être transférés à un autre participant."
  faq_student_q: "Y a-t-il une réduction pour les étudiants ?"
  faq_student_a: "Absolument ! Nous offrons une réduction de 50% pour les étudiants actuellement inscrits. Veuillez envoyer une copie de votre carte d'étudiant à tickets@rubyconf.africa pour recevoir votre code promo."
  faq_payment_q: "Quels modes de paiement acceptez-vous ?"
  faq_payment_a: "Nous acceptons M-Pesa, les cartes de crédit/débit (Visa, Mastercard), les virements bancaires et PayPal. Cela garantit que les participants locaux et internationaux peuvent facilement acheter des billets."
  faq_recorded_q: "Les sessions seront-elles enregistrées ?"
  faq_recorded_a: "Oui, toutes les présentations de la scène principale seront enregistrées. Les détenteurs de Pass complet ont accès aux enregistrements 1 semaine après l'événement. Ils seront rendus publics 3 mois plus tard."
  ready_to_join: "Prêt à nous rejoindre ?"
