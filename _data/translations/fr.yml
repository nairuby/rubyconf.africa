practicalities:
  title: "Informations pratiques pour Ruby Conf Africa 2026"
  description: "Trouvez toutes les informations pratiques dont vous avez besoin pour assister à Ruby Conf Africa 2026, y compris les détails du lieu, les informations de voyage et l'hébergement."
  hero_subtitle: "Votre guide complet pour assister à RubyConf Africa"
  download_guide: "Télécharger le guide de voyage"
  intro_update: "Explorez notre guide complet de A à Z pour <strong>RubyConf Africa 2026</strong>. Nous maintenons ces informations à jour, alors attendez-vous à des mises à jour à l'approche de l'événement. Dernière mise à jour le <strong>23 décembre 2025</strong>."
  travel_auth_title: "Autorisations de voyage"
  travel_auth_subtitle: "Voyager au Kenya pour Ruby Conf Africa 2026"
  visa_text: "Il n'y a pas d'exigences de visa pour tout voyageur visitant le Kenya, cependant vous devez compléter votre <strong>Autorisation de voyage électronique</strong> (eTA) au moins <strong>2 semaines</strong> avant de voyager au Kenya pour éviter les inconvénients."
  faq_fee_q: "Quel est le coût de l'eTA pour les voyageurs ?"
  faq_fee_a: "Les frais d'eTA sont de <strong>32,50 USD</strong> par voyageur, plus les frais bancaires et de traitement."
  faq_who_q: "Qui doit demander l'eTA ?"
  faq_who_a_1: "Tous les visiteurs étrangers doivent demander une eTA sauf s'ils sont titulaires d'une résidence permanente valide au Kenya, de permis de travail et de laissez-passer."
  faq_who_a_2: "Les titulaires de passeports des pays <strong>EAC</strong> suivants sont exemptés de demander une eTA : <em>Burundi, République démocratique du Congo, Rwanda, Soudan du Sud, Tanzanie et Ouganda</em>."
  faq_who_note: "<strong>Note importante :</strong> La demande d'eTA collecte des informations biographiques et des réponses aux questions d'éligibilité du voyageur. Les demandes sont généralement traitées dans les <strong>3 jours</strong>, mais dans certains cas, cela peut prendre plus de temps. <strong>Nous recommandons de faire votre demande d'eTA 2 semaines avant le voyage</strong>. Vous pouvez soumettre votre demande jusqu'à 3 mois avant le voyage."
  faq_who_rec: "Nous vous recommandons vivement de faire votre demande dès que vous avez réservé votre hébergement et vos billets de transport."
  faq_how_q: "Comment demander votre eTA ?"
  faq_how_a: "Les demandes se font via le site officiel de l'Autorité de voyage électronique du Kenya :"
  faq_health_q: "Quels documents de santé dois-je présenter à mon arrivée au Kenya ?"
  faq_health_a_1: "Actuellement, un certificat de fièvre jaune est requis et dans certains cas, un certificat COVID-19 sera nécessaire."
  faq_health_a_2: "Veuillez vous référer à ces"
  incoming_travellers: "Voyageurs entrants"
  requirements_details: "exigences pour plus de détails."
  faq_docs_q: "Quels documents sont nécessaires pour votre demande d'ETA ?"
  faq_docs_intro: "Veuillez avoir les documents suivants prêts avant de commencer votre demande :"
  doc_passport: "Passeport valide pendant au moins six (6) mois après votre date d'arrivée prévue au Kenya, avec au moins une page vierge."
  doc_photo: "Photo de passeport récente OU une photo selfie prise pendant le processus de demande."
  doc_contact: "Coordonnées (adresse du domicile, téléphone, email)."
  doc_travel_info: "Informations de voyage et itinéraire de vol (numéro de vol d'arrivée, date de départ du vol initial en cas de vols de correspondance)."
  doc_booking: "Preuve de réservation pour l'hôtel où vous séjournerez (si vous séjournez chez des amis, une lettre d'invitation est acceptée)."
  doc_payment: "Informations de carte de crédit/débit pour le paiement, le cas échéant."
  doc_invitation: "Invitation à la conférence ou lettre de participation."
  doc_invitation_note: "Pour obtenir l'invitation à la conférence ou la lettre de participation, remplissez le"
  conference_letter_form: "formulaire de demande de lettre de conférence"
  to_provide_letter: "pour vous fournir la lettre."
  speakers_guide_title: "Guide pour les conférenciers voyageurs !"
  speakers_guide_text: "Veuillez noter que, malheureusement, nous ne sommes pas en mesure de couvrir les frais de voyage ou d'hébergement pour les conférenciers. Par conséquent, vous devrez organiser vous-même vos vols et hôtels. Nous comprenons que cette information est cruciale pour planifier votre voyage, et nous trouvons important de le communiquer clairement."
  hotel_title: "Recommandations d'hôtels"
  hotel_text: "Nous avons sélectionné une sélection d'hôtels bien notés, tous à proximité de notre lieu. Répondant à diverses préférences et budgets, ces options garantissent commodité et confort pendant votre séjour. Pour toute question, veuillez nous écrire à"
  hotel_button: "Voir les recommandations d'hôtels détaillées"
  attractions_title: "Attractions touristiques au Kenya"
  attractions_subtitle: "Un guide pour les conférenciers et invités internationaux"
  nairobi_park: "<strong>Parc national de Nairobi :</strong> Observez des lions, des zèbres, des girafes et des rhinocéros à quelques minutes en voiture du centre-ville de Nairobi."
  giraffe_centre: "<strong>Centre des girafes :</strong> Approchez-vous des girafes de Rothschild en voie de disparition dans ce sanctuaire à but non lucratif."
  sheldrick_trust: "<strong>David Sheldrick Wildlife Trust :</strong> Visitez l'orphelinat et découvrez les efforts de sauvetage et de réhabilitation des éléphants."
  museum: "<strong>Musée national de Nairobi :</strong> Plongez dans la riche histoire et culture du Kenya."
  karen_blixen: "<strong>Musée Karen Blixen :</strong> Explorez la maison de l'auteur de \"La Ferme africaine\"."
  bomas: "<strong>Bomas du Kenya :</strong> Découvrez la culture kenyane traditionnelle à travers la danse et les démonstrations."
  uhuru_park: "<strong>Parc Uhuru :</strong> Détendez-vous dans le plus grand parc de Nairobi avec lac et promenades en bateau."
  maasai_mara: "<strong>Réserve nationale du Masai Mara :</strong> Assistez à l'impressionnante migration des gnous."
  amboseli: "<strong>Parc national d'Amboseli :</strong> Admirez les éléphants sur fond du mont Kilimandjaro."
  lake_nakuru: "<strong>Parc national du lac Nakuru :</strong> Observez des concentrations spectaculaires de flamants roses."
  karura: "<strong>Forêt de Karura :</strong> Randonnée ou vélo à travers cette vaste forêt indigène."
  ngong_hills: "<strong>Collines de Ngong :</strong> Randonnée ou aventure en tyrolienne avec vue sur la vallée du Grand Rift."
  shopping: "<strong>Shopping :</strong> Explorez les marchés animés comme le marché Maasai ou les centres commerciaux haut de gamme."
  final_note_title: "Rappelez-vous, ce n'est qu'un point de départ !"
  final_note_text: "Le Kenya a une richesse d'autres attractions à découvrir. Assurez-vous de consulter votre agent de voyage ou de faire des recherches supplémentaires en ligne pour trouver des expériences qui correspondent à vos intérêts et contraintes de temps. <strong>Profitez de votre séjour au Kenya !</strong>"

code_of_conduct_page:
  title: "Code de conduite Ruby Conf Africa 2026"
  description: "Lisez le code de conduite de Ruby Conf Africa 2026. Nous nous engageons à fournir un environnement sûr et accueillant pour tous les participants."
  hero_title: "Code de conduite"
  hero_subtitle: "Ruby Conf Africa 2026"
  hero_description: "Nous nous engageons à fournir un environnement sûr et accueillant pour tous les participants. Lisez notre code de conduite pour comprendre nos normes communautaires."
  commitment_title: "Notre engagement"
  commitment_text: "La communauté Ruby africaine s'engage à fournir une expérience d'événement sans harcèlement et inclusive pour tous, indépendamment de l'identité et de l'expression de genre, de l'orientation sexuelle, des handicaps, de la neurodiversité, de l'apparence physique, de la taille corporelle, de l'ethnicité, de la nationalité, de la race, de l'âge, de la religion ou de toute autre catégorie protégée."
  expected_behavior_title: "Comportement attendu"
  be_excellent_title: "Soyez excellents les uns envers les autres"
  be_excellent_text: "Nous voulons que l'événement soit une excellente expérience pour tous, indépendamment de l'identité et de l'expression de genre, de l'orientation sexuelle, des handicaps, de la neurodiversité, de l'apparence physique, de la taille corporelle, de l'ethnicité, de la nationalité, de la race, de l'âge, de la religion ou de toute autre catégorie protégée. Traitez tout le monde avec respect. Participez en reconnaissant que chacun mérite d'être ici et que chacun de nous a le droit de profiter de notre expérience sans crainte de harcèlement, de discrimination ou de condescendance, qu'elle soit flagrante ou via des micro-agressions."
  speak_up_title: "Parlez si vous voyez ou entendez quelque chose"
  speak_up_text: "Le harcèlement n'est pas toléré, et vous êtes habilité à intervenir poliment lorsque vous ou d'autres êtes manqués de respect. La personne qui vous met mal à l'aise peut ne pas être consciente de ce qu'elle fait, et attirer poliment son attention sur son comportement est encouragé. Si vous êtes harcelé ou vous sentez mal à l'aise, remarquez que quelqu'un d'autre est harcelé, ou avez d'autres préoccupations, veuillez contacter immédiatement un membre du personnel de l'événement."
  unacceptable_behavior_title: "Comportement inacceptable"
  harassment_text: "Le harcèlement n'est pas toléré et comprend, sans s'y limiter :"
  harassment_1: "Langage verbal qui renforce les structures sociales de domination"
  harassment_2: "Imagerie sexuelle dans les espaces publics"
  harassment_3: "Intimidation délibérée, harcèlement ou poursuite"
  harassment_4: "Photographie ou enregistrement harcelant"
  harassment_5: "Perturbation soutenue des discussions ou autres événements"
  harassment_6: "Contact physique inapproprié et attention sexuelle non désirée"
  harassment_compliance: "Les participants invités à arrêter tout comportement de harcèlement sont censés se conformer immédiatement."
  scope_title: "Portée"
  scope_text_1: "Cette politique s'étend aux discussions, forums, ateliers, laboratoires de code, médias sociaux, fêtes, conversations dans les couloirs, tous les participants, partenaires, sponsors, bénévoles, personnel de l'événement, etc."
  scope_text_2: "La communauté Ruby africaine se réserve le droit de refuser l'admission ou de retirer toute personne de tout événement hébergé par la communauté Ruby africaine (y compris les événements futurs) à tout moment à sa seule discrétion."
  zero_tolerance: "<strong>Notre politique de tolérance zéro</strong> signifie que nous examinerons et réviserons chaque allégation de violation de nos directives communautaires d'événement et de notre politique anti-harcèlement et répondrons de manière appropriée."
  partners_title: "Partenaires exposants et sponsors"
  partners_text: "Les partenaires exposants, les sponsors ou les stands de vendeurs, ou des activités similaires sont également soumis à cette politique. En particulier, les exposants ne doivent pas utiliser d'images, d'activités ou d'autres matériaux sexualisés. Le personnel des stands (y compris les bénévoles) ne doit pas utiliser de vêtements/uniformes/costumes sexualisés, ou créer autrement un environnement sexualisé."
  why_important_title: "Pourquoi cette politique est importante"
  why_important_text: "Le harcèlement lors d'événements et dans les communautés en ligne est malheureusement courant. La création d'une politique officielle vise à améliorer cela en précisant que le harcèlement de quiconque pour quelque raison que ce soit n'est pas acceptable dans nos événements et communautés. Cette politique peut prévenir le harcèlement en définissant clairement les attentes en matière de comportement, vise à rassurer et encourage les personnes qui ont eu de mauvaises expériences lors d'autres événements à participer à celui-ci."
  license_title: "Licence et attribution"
  license_text_1: "Cette politique est sous licence"
  license_link_text: "Creative Commons Zero"
  license_text_2: "Cette politique est basée sur et influencée par plusieurs autres politiques communautaires, notamment la politique anti-harcèlement de l'Ohio LinuxFest, le projet Con Anti-Harassment, le Wiki Geek Feminism (créé par l'Ada Initiative), ConfCodeofConduct.com, JSconf, Rust, Diversity in Python et Write/Speak/Code."

