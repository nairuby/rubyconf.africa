  faq_recorded_q: "Je, vikao vitarekodiwa?"
  faq_recorded_a: "Ndiyo, mazungumzo yote ya jukwaa kuu yatarekodiwa. Wamiliki wa Pasi kamili wanapata ufikiaji wa rekodi wiki 1 baada ya tukio. Zitafanywa za umma miezi 3 baadaye."
